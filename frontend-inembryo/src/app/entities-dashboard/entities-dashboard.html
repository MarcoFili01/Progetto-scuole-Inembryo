<div class="dashboard-container force-uppercase">
  
  <header class="dashboard-header">
    <mat-button-toggle-group (change)="onFilterChange($event.value)">
  <mat-button-toggle value="statale">STATALE</mat-button-toggle>
  <mat-button-toggle value="paritaria">PARITARIA</mat-button-toggle>
</mat-button-toggle-group>

    <button mat-raised-button color="primary" (click)="openAddPopup()">
      AGGIUNGI ENTE
    </button>
  </header>

  <table mat-table [dataSource]="filteredEntities" class="mat-elevation-z8">
    
    <ng-container matColumnDef="nome_istituzione">
  <th mat-header-cell *matHeaderCellDef> Nome Istituzione </th>
  <td mat-cell *matCellDef="let element"> {{element.nome_istituzione}} </td>
</ng-container>

<ng-container matColumnDef="provincia">
  <th mat-header-cell *matHeaderCellDef> Provincia </th>
  <td mat-cell *matCellDef="let element"> {{element.provincia}} </td>
</ng-container>

<ng-container matColumnDef="tipo">
  <th mat-header-cell *matHeaderCellDef> Tipo </th>
  <td mat-cell *matCellDef="let element"> {{element.tipo}} </td>
</ng-container>

<ng-container matColumnDef="email_istituzionale">
  <th mat-header-cell *matHeaderCellDef> Email </th>
  <td mat-cell *matCellDef="let element"> {{element.email_istituzionale}} </td>
</ng-container>

<ng-container matColumnDef="pec">
  <th mat-header-cell *matHeaderCellDef> PEC </th>
  <td mat-cell *matCellDef="let element"> {{element.pec}} </td>
</ng-container>

<ng-container matColumnDef="sito_web">
  <th mat-header-cell *matHeaderCellDef> Sito Web </th>
  <td mat-cell *matCellDef="let element">
    <a *ngIf="element.sito_web" [href]="element.sito_web" target="_blank">Visita</a>
  </td>
</ng-container>

<ng-container matColumnDef="linkedin">
  <th mat-header-cell *matHeaderCellDef> Linkedin </th>
  <td mat-cell *matCellDef="let element">
    <a *ngIf="element.linkedin" [href]="element.linkedin" target="_blank">Profilo</a>
  </td>
</ng-container>

<ng-container matColumnDef="social">
  <th mat-header-cell *matHeaderCellDef> Social </th>
  <td mat-cell *matCellDef="let element">
    <a *ngIf="element.social" [href]="element.social" target="_blank">Link</a>
  </td>
</ng-container>

<ng-container matColumnDef="numero_telefono">
  <th mat-header-cell *matHeaderCellDef> Telefono </th>
  <td mat-cell *matCellDef="let element"> {{element.numero_telefono}} </td>
</ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Azioni </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="accent" (click)="openEditPopup(element)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="openDeletePopup(element)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

</div>
