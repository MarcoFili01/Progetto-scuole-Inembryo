<h2 mat-dialog-title>ELIMINAZIONE</h2>
<mat-dialog-content>
  <p>Sei sicuro di voler eliminare {{data.name}}?</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>ANNULLA</button>
  <button mat-raised-button color="warn" [mat-dialog-close]="true">ELIMINA</button>
</mat-dialog-actions>
